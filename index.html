<!DOCTYPE html>
<html>
<head>
    <title>IPTV M3U Extractor</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { width: 300px; padding: 5px; margin: 5px; }
        button { padding: 8px 15px; margin: 5px; }
        textarea { width: 100%; height: 200px; margin-top: 10px; }
        .url-box { background: #f5f5f5; padding: 10px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>🔍 IPTV M3U Playlist Extractor</h2>
    
    <div>
        <label>Portal URL:</label><br>
        <input type="text" id="portalUrl" value="http://pro.reott8k.xyz:80/">
    </div>
    
    <div>
        <label>MAC Address:</label><br>
        <input type="text" id="macAddress" value="00:1A:79:7B:BB:36">
    </div>
    
    <button onclick="testAllUrls()">🔎 Test All M3U URLs</button>
    <button onclick="extractFromPage()">🌐 Extract from Portal Page</button>
    
    <div id="result"></div>
    <textarea id="m3uOutput" placeholder="M3U content will appear here..."></textarea>
    
    <div id="channelList"></div>

    <script>
        const patterns = [
            // Pattern 1: get.php (most common)
            '{portal}get.php?username={mac}&password={mac}&type=m3u_plus',
            
            // Pattern 2: Alternative password format
            '{portal}get.php?username={mac}&password={macReplace}&type=m3u',
            
            // Pattern 3: Simple m3u
            '{portal}{mac}/m3u',
            
            // Pattern 4: Portal with parameters
            '{portal}c/?type=m3u&mac={mac}',
            
            // Pattern 5: LiveTV format
            '{portal}live/{mac}/{mac}/index.m3u',
            
            // Pattern 6: XMLTV format (then convert)
            '{portal}xmltv.php?username={mac}&password={mac}',
            
            // Pattern 7: Player API
            '{portal}player_api.php?username={mac}&password={mac}&action=get_live_streams',
        ];

        function testAllUrls() {
            const portal = document.getElementById('portalUrl').value;
            const mac = document.getElementById('macAddress').value;
            const macReplace = mac.replace(/:/g, '-');
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<h3>Testing URLs...</h3>';
            
            patterns.forEach((pattern, index) => {
                const url = pattern
                    .replace('{portal}', portal)
                    .replace('{mac}', mac)
                    .replace('{macReplace}', macReplace);
                
                // Create URL box
                const urlBox = document.createElement('div');
                urlBox.className = 'url-box';
                urlBox.innerHTML = `
                    <strong>Test ${index+1}:</strong> ${url}
                    <button onclick="testSingleUrl('${url}')">Test</button>
                    <span id="status${index}"></span>
                `;
                resultDiv.appendChild(urlBox);
            });
        }

        async function testSingleUrl(url) {
            try {
                // Use CORS proxy for testing
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(url));
                
                if(!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const text = await response.text();
                const m3uOutput = document.getElementById('m3uOutput');
                
                if(text.includes('#EXTM3U')) {
                    // SUCCESS! Found M3U
                    m3uOutput.value = text;
                    
                    // Parse channels
                    parseM3U(text);
                    
                    alert(`✅ M3U FOUND! ${text.split('#EXTINF:').length-1} channels detected.`);
                } else {
                    m3uOutput.value = `Not M3U format. Response:\n\n${text.substring(0, 500)}...`;
                }
            } catch(error) {
                alert(`❌ Error: ${error.message}`);
            }
        }

        function parseM3U(m3uContent) {
            const lines = m3uContent.split('\n');
            const channels = [];
            let currentChannel = {};
            
            lines.forEach(line => {
                line = line.trim();
                
                if(line.startsWith('#EXTINF:')) {
                    // Parse channel info
                    const match = line.match(/#EXTINF:-?\d+(?: tvg-id="([^"]*)")? tvg-name="([^"]*)"?.*,(.*)/);
                    if(match) {
                        currentChannel = {
                            name: match[3] || 'Unknown',
                            tvgId: match[1] || '',
                            tvgName: match[2] || ''
                        };
                    }
                } else if(line && !line.startsWith('#') && currentChannel.name) {
                    // This is the stream URL
                    currentChannel.url = line;
                    channels.push({...currentChannel});
                    currentChannel = {};
                }
            });
            
            // Display channels
            const channelList = document.getElementById('channelList');
            if(channels.length > 0) {
                channelList.innerHTML = `
                    <h3>📺 Found ${channels.length} Channels:</h3>
                    <ul>
                        ${channels.slice(0, 20).map(ch => 
                            `<li>${ch.name} <button onclick="playStream('${ch.url}')">Play</button></li>`
                        ).join('')}
                    </ul>
                    ${channels.length > 20 ? `<p>... and ${channels.length-20} more channels</p>` : ''}
                `;
            }
        }

        function playStream(url) {
            // Test if stream is playable
            const video = document.createElement('video');
            video.controls = true;
            video.width = 640;
            video.src = url;
            
            const playerDiv = document.createElement('div');
            playerDiv.innerHTML = `<h4>Testing Stream Playback</h4>`;
            playerDiv.appendChild(video);
            
            document.getElementById('result').appendChild(playerDiv);
        }

        async function extractFromPage() {
            const portal = document.getElementById('portalUrl').value;
            const mac = document.getElementById('macAddress').value;
            
            // Try to load portal page and look for M3U links
            const portalUrl = `${portal}c/?mac=${mac}`;
            
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(portalUrl));
                const data = await response.json();
                const html = data.contents;
                
                // Search for M3U links in HTML
                const m3uLinks = html.match(/(https?:\/\/[^"']+\.m3u[^"']*)/gi) || [];
                const getPhpLinks = html.match(/(get\.php[^"']+type=m3u[^"']*)/gi) || [];
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <h3>🔗 Found in Portal Page:</h3>
                    ${m3uLinks.length > 0 ? 
                        m3uLinks.map(link => `<div>${link} <button onclick="testSingleUrl('${link}')">Test</button></div>`).join('') :
                        'No M3U links found in page source.'
                    }
                    ${getPhpLinks.length > 0 ? 
                        getPhpLinks.map(link => `<div>${portal}${link} <button onclick="testSingleUrl('${portal}${link}')">Test</button></div>`).join('') :
                        ''
                    }
                `;
                
            } catch(error) {
                alert('Error loading portal page: ' + error.message);
            }
        }
    </script>
</body>
</html>
