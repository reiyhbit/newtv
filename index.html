<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bivamax</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #141414;
}

/* SLIDER */
.slider {
  position: relative;
  width: 100%;
  height: 300px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1s ease-in-out;
}

.slide.active {
  opacity: 1;
}

.slide-overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  font-size: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 15px;
  padding: 20px;
}

.channel-card {
  background: #1c1c1c;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.channel-card:hover {
  transform: scale(1.07);
  background: #252525;
}

.channel-card img {
  width: 100%;
  height: 130px;
  object-fit: contain;
  background: black;
}

.channel-name {
  padding: 8px;
  font-size: 14px;
}

/* PLAYER OVERLAY */
.overlay {
  position: fixed;
  display: none;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.overlay video {
  width: 85%;
  max-width: 1000px;
}

.close-btn {
  margin-top: 10px;
  padding: 8px 15px;
  background: red;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>
<body>

<div class="header">BivaReiyh</div>

<!-- SLIDER -->
<div class="slider" id="slider"></div>

<!-- CHANNEL GRID -->
<div class="grid" id="channelGrid"></div>

<!-- PLAYER -->
<div class="overlay" id="playerOverlay">
  <video id="videoPlayer" controls autoplay></video>
  <button class="close-btn" onclick="closePlayer()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.4.0/shaka-player.compiled.js"></script>

<script>
(async () => {

const playlistUrl = "https://raw.githubusercontent.com/reiyhbit/iptv/refs/heads/main/viva.m3u";
const response = await fetch(playlistUrl);
const text = await response.text();

const lines = text.split("\n").filter(l => l.trim() !== "");
let channels = [];

for (let i = 0; i < lines.length; i++) {
  if (lines[i].startsWith("#EXTINF")) {
    let name = lines[i].split(",")[1] || "Unknown";
    let logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
    let logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/500x300?text=No+Banner";
    let url = lines[i + 1] || "";
    channels.push({ name: name.trim(), logo: logo, url: url.trim() });
  }
}

/* BUILD SLIDER (first 5 channels as banner) */
const slider = document.getElementById("slider");
channels.slice(0,5).forEach((ch, index) => {
  const slide = document.createElement("div");
  slide.className = "slide";
  slide.style.backgroundImage = `url('${ch.logo}')`;
  if(index === 0) slide.classList.add("active");
  slide.innerHTML = `<div class="slide-overlay">${ch.name}</div>`;
  slider.appendChild(slide);
});

let currentSlide = 0;
setInterval(() => {
  const slides = document.querySelectorAll(".slide");
  slides[currentSlide].classList.remove("active");
  currentSlide = (currentSlide + 1) % slides.length;
  slides[currentSlide].classList.add("active");
}, 4000);

/* BUILD GRID */
const grid = document.getElementById("channelGrid");

channels.forEach(channel => {
  const card = document.createElement("div");
  card.className = "channel-card";
  card.innerHTML = `
    <img src="${channel.logo}">
    <div class="channel-name">${channel.name}</div>
  `;
  card.onclick = () => playChannel(channel.url);
  grid.appendChild(card);
});

})();

function playChannel(url) {
  const overlay = document.getElementById("playerOverlay");
  const video = document.getElementById("videoPlayer");

  overlay.style.display = "flex";

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.play();
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = url;
    video.play();
  } else {
    shaka.polyfill.installAll();
    const player = new shaka.Player(video);
    player.load(url).catch(e => console.error(e));
  }
}

function closePlayer() {
  const overlay = document.getElementById("playerOverlay");
  const video = document.getElementById("videoPlayer");
  video.pause();
  video.src = "";
  overlay.style.display = "none";
}
</script>

</body>
</html>
